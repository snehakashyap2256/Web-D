<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <center>
        <form>
            <table width="30%" cellpadding="15" cellspacing="10"  style="border: 1px solid black; border-collapse: collapse;">
                <tr >
                    <td colspan="4" style="background-color:#e491b5;" ><font size="5">Emergency contact Info</font>&nbsp;&nbsp;&nbsp;&nbsp; More actions▼</td>
                </tr>
                <tr>
                    <td>First Name</td>
                    <td ><input type="text" required style="width:300px; height:20px;"></td>
                    <td colspan="2"><u>Emergency contact info</u></td>
                </tr>
                <tr>
                    <td>Last Name</td>
                    <td><input type="text" style="width:300px; height:20px;"></td>
                    <td>Name</td>
                    <td><input type="text" style="width:300px; height:20px;"></td>
                </tr>
                <tr>
                    <td>Gender</td>
                    <td>
                     <select style="width:300px; height:20px;">
                        <option width="50%" value ="Male" id="i1"><label for =i1>Male</label></option>
                         <option value ="Female " id="i2"><label for =i2>Female </label></option>
                     </select>   
                    </td>
                    <td>Relationship</td>
                    <td><input type="text" style="width:300px; height:20px; height:20px;"></td>
                </tr>
                <tr>
                    <td>Date Of Birth</td>
                    <td><input type="date" ></td>
                    <td rowspan="2" valign="top">Address</td>
                    <td rowspan="2"><textarea rows="10" cols="40"></textarea></td>
                </tr>
                <tr>
                    <td colspan="2"><u>Medical Information</u></td>
                </tr>
                <tr>
                    <td>Hospital Preference</td>
                    <td><input type="text" style="width:300px;"></td>
                    <td>City</td>
                    <td><input type="text" style="width:300px; height:20px;"></td>
                </tr>
                <tr>
                    <td>Insurance Company</td>
                    <td><input type="text" style="width:300px; height:20px; "></td>
                    <td>State</td>
                    <td >
                        <select style="width:300px; height:20px;">
                            <option value="" disabled selected>--Select--</option>
                             <option value="hr" >Haryana</option>
                             <option value="pb" >Punjab</option>
                             <option value="up" >Uttar pradesh</option>
                             <option value="mp" >Madhya pradesh</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <td>Policy Number</td>
                    <td ><input type="number" style="width:300px; height:20px;"></td>
                    <td>Country</td>
                    <td >
                        <select style="width:300px; height:20px;">
                            <option value="" disabled selected >--Select--</option>
                             <option value="ind" >India</option>
                             <option value="nepal" >Nepal</option>
                             <option value="china" >China</option>
                             <option value="russia" >Russsia</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <td>Physician's Name</td>
                    <td><input type="text" style="width:300px; height:20px;"></td>
                    <td>Home Phone</td>
                    <td><input type="number" style="width:300px; height:20px;"></td>
                </tr>
                <tr>
                    <td>Phone Number</td>
                    <td><input type="number" style="width:300px; height:20px; " required></td>
                    <td>Work Phone</td>
                    <td><input type="number" style="width:300px; height:20px;"></td>
                </tr>
                <tr>
                    <td valign="top">Allergies (if any)</td>
                    <td><textarea rows="10" cols="40"></textarea></td>
                </tr>
                <tr>
                    <td colspan="4" align="center" bgcolor="#e3e3e3"><input type="submit"  value="Submit" style="background-color:#e491b5;width:100px; height:30px;">
                                                   <input type="reset" value="Reset" style="background-color:#e491b5;width:100px; height:30px;"></td>
                </tr>

            </table>
        </form>
    </center>
</body>
</html>

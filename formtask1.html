<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <center>
        <form>
            <table border="4" width="20%" cellpadding="5" align="center" cellspacing="8">
                <tr>
                    <td colspan="2" align="center"><strong>Pizza Shop 2.0</strong></td>
                </tr>
                <tr>
                    <td>Name</td>
                    <td><input type="text"></td>
                </tr>
                <tr >
                    <td  border="0">Pizza Topping</td>
                    <td ><input type="radio" name="topping" id="t1"><label for="t1">Supreme</label><br>
                    <input type="radio" name="topping" id="t2"><label for="t2">Vegetarian</label><br>
                <input type="radio" name="topping" id="t3"><label for="t3">Hawaiian</label></td>
                </tr>
                <tr>
                    <td>Pizza Sauce</td>
                    <td>
                        <select>
                            <option value="tomato" >Tomato</option>
                            <option value="pesto" >pesto</option>
                            <option value="alfredo" >alfredo</option>
                            <option value="barbecue" >barbecue</option>
                            <option value="romesco" >romesco</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <td>Optional Extras</td>
                    <td>
                            <input type="checkbox" value="cheese" id="123"><label for="123">Extra Cheese</label>
                            <input type="checkbox" value="gluten" id="124"><label for="124">Gluten Free Base</label>
                    </td>
                </tr>
                <tr>
                    <td colspan="2">Delivery Instructions:</td>
                </tr>
                <tr>
                    <td colspan="2"><textarea rows="5" cols="70"></textarea></td>
                </tr>
                <tr>
                    <td colspan="2"><input type="submit" value="Send my order"></td>
                </tr>
            </table>
        </form>
    </center>
</body>
</html>

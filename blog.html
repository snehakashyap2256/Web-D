<!doctype html>
<html lang="en">

    <link

      .container {

        position: relative;
        text-align: center;
        color: white;

      .box {

        float: left;

        margin-left: 200px;

      .bottom {
        height: 150px;

        background-color: rgba(33, 124, 143, 255);

        bottom: 0;
        left: 0;
        font-size: 20px;
        line-height: 1.3;
      }
      .bottom p {
        font-size: 10px;
        line-height: 1.5;
      }
      .circle {

        height: 35px;

        float: left;
        margin-top: -10px;
        margin-left: -10px;

        line-height: 1.8;
        margin-left: 30px;
        margin-right: 30px;
        color: white;
      }

        line-height: 2.5;

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
  />
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      .layout {
        width: 1000px;
        height: 550px;
        border: 5px solid black;
        margin: 50px auto 0;
        box-sizing: border-box;
        padding: 14px;
        text-align: center;
         background-color: #e4b20e;
      }
      .lay1 {
        width: 120px;
        height: 120px;
        border: 5px solid black;
        float: left;
        background-color: white;
        line-height: 9.5;
      }
      .lay2 {
        width: 120px;
        height: 120px;
        border: 5px solid black;
        float: left;
        margin-left: 30%;
        background-color: white;
        line-height: 9.5;
      }
      .lay3 {
        width: 120px;
        height: 120px;
        border: 5px solid black;
        float: right;
        background-color: white;
        line-height: 9.5;
      }
      .mid {
        height: 180px;
        border: 5px solid black;
        margin-top: 40px;
        box-sizing: border-box;
        background-color: white;
      }
      .lay4 {
        width: 120px;
        height: 120px;
        border: 5px solid black;
        float: left;
        margin-top: 35px;
        background-color: white;
        line-height: 9.5;
      }
      .lay5 {
        width: 120px;
        height: 120px;
        border: 5px solid black;
        float: left;
        margin-left: 30%;
        margin-top: 35px;
        background-color: white;
        line-height: 9.5;
      }
      .lay6 {
        width: 120px;
        height: 120px;
        border: 5px solid black;
        float: right;
        margin-top:35px;
        background-color: white;
        line-height: 9.5;
      }
      .mid1 {
        height: 120px;
        width: 400px;
        border: 5px solid black;
        float: left;
        margin-top: 22px;
        margin-left: 25px;
        border-radius: 15px;
        background-color: #0A192F;
        color:white;
        font-size: 50px;
        font-weight: bold;
        line-height: 2.5;
      }
      .mid2 {
        height: 120px;
        width: 400px;
        border: 5px solid black;
        float: right;
        margin-top: 22px;
        margin-right: 25px;
        border-radius: 15px;
         background-color: #0A192F;
         color:white;
         font-size: 50px;
         font-weight: bold;
         line-height: 2.5;
      }
      .shadow {
        box-shadow: 2px 3px 5px #000;
      }
      .yt
        {
            color: red;
            font-size: 60px;
        }
        .fb
        {
            color: rgb(10, 10, 136);
            font-size: 60px;
        }
        .sc
        {
            color: rgb(240, 250, 47);
            font-size: 70px;
        }
        .li
        {
            color: rgb(38, 15, 152);
            font-size: 60px;
        }
        .shp
        {
            color: rgb(126, 116, 52);
            font-size: 60px;
        }
        .git
        {
            color: rgb(18, 13, 13);
            font-size: 60px;
        }
      .clear {
        clear: both;
      }
    </style>
  </head>
  <body>
    <div class="layout shadow">
      <div class="lay1 shadow"><i class="fa-brands fa-youtube yt"></i></div>
      <div class="lay2 shadow"><i class="fa-brands fa-facebook fb"></i></div>
      <div class="lay3 shadow"><i class="fa-brands fa-square-snapchat sc"></i></div>
      <br class="clear" />
      <div class="mid shadow">
        <div class="mid1 shadow "><p class="animate__animated animate__rubberBand animate__infinite">Animated</p></div>
        <div class="mid2 shadow "><p class="animate__animated animate__rubberBand animate__infinite">Text</p></div>
        <br class="clear" />
      </div>
      <div class="lay4 shadow"><i class="fa-solid fa-cart-shopping shp"></i></div>
      <div class="lay5 shadow"><i class="fa-brands fa-linkedin li"></i></div>
      <div class="lay6 shadow"><i class="fa-brands fa-github git"></i></div>
      <br class="clear shadow" />
    </div>
  </body>
</html>
